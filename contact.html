<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="stylecontact.css">
</head>
<body>

<section class="contact-section">
  <div class="contact-section__container">

    <div class="contact-section__info">
      <h2 class="contact-section__title">Contáctanos</h2>
      <p class="contact-section__text">
        ¿Tienes un problema o necesitas un servicio? Escríbenos y te responderemos lo antes posible.
      </p>
    </div>

    <form class="contact-section__form">
      <div class="contact-section__group">

        <div class="contact-section__field">
          <input type="text" placeholder="Nombre completo" required>
        </div>

        <div class="contact-section__field">
          <input type="tel" placeholder="Teléfono" required>
        </div>

        <div class="contact-section__field">
          <input type="email" placeholder="Correo electrónico" required>
        </div>

        <div class="contact-section__field">
          <textarea rows="4" placeholder="Cuéntanos qué necesitas"></textarea>
        </div>

        <button class="contact-section__btn">Enviar mensaje</button>

      </div>
    </form>

  </div>
</section>

</body>
</html>
