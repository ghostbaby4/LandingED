<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="stylecontact.css">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GVBNVKZS9V"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-GVBNVKZS9V');
</script>
</head>
<body>

<section class="contact-section">
  <div class="contact-section__container">

    <div class="contact-section__info">
      <h2 class="contact-section__title">Contáctanos</h2>

      <p class="contact-section__text">
        Completa el formulario y nuestro equipo se pondrá en contacto contigo lo antes posible.
      </p>
    </div>

    <form  id="contactForm" class="contact-section__form">

      <div class="contact-section__group grid-form">

        <div class="contact-section__field">
          <input type="text" id="nombre" placeholder="Nombre" required>
        </div>

        <div class="contact-section__field">
          <input type="text" id="apellido" placeholder="Apellido" required>
        </div>

        <div class="contact-section__field">
          <input type="tel" id="telefono" placeholder="Teléfono" required>
        </div>

        <div class="contact-section__field">
          <input type="email" id="correo" placeholder="Correo electrónico" required>
        </div>

        <div class="contact-section__field">
          <select id="tipo_cliente" required>
            <option value="" disabled selected>
              Tipo de cliente
            </option>

            <option value="Persona">
              Persona
            </option>

            <option value="Empresa">
              Empresa
            </option>
          </select>
        </div>

        <div class="contact-section__field">
          <select id="departamento" required>

            <option value="" disabled selected>
              Departamento
            </option>

            <option value="Managua">Managua</option>
            <option value="León">León</option>
            <option value="Granada">Granada</option>
            <option value="Masaya">Masaya</option>
            <option value="Carazo">Carazo</option>
            <option value="Chinandega">Chinandega</option>
            <option value="Estelí">Estelí</option>
            <option value="Matagalpa">Matagalpa</option>
            <option value="Jinotega">Jinotega</option>
            <option value="Boaco">Boaco</option>
          </select>
        </div>

        <div class="contact-section__field">
          <select id="servicio" required>

            <option value="" disabled selected>
              Servicio de interés
            </option>

            <option value="Soporte técnico">Soporte técnico</option>
            <option value="Mantenimiento preventivo">Mantenimiento preventivo</option>
            <option value="Instalación de redes">Instalación de redes</option>
            <option value="Reparación de equipos">Reparación de equipos</option>

          </select>
        </div>

        <div class="contact-section__field">
          <textarea id="comentario" rows="5" placeholder="Cuéntanos qué necesitas o el problema que presentas"></textarea>
        </div>

        <button type="submit" class="contact-section__btn">
          Enviar mensaje
        </button>

      </div>

    </form>

  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="scripts.js"></script>
</body>
</html>
