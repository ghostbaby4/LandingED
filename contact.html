<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="stylecontact.css">
</head>
<body>

<section class="contact-section">
  <div class="contact-section__container">

    <div class="contact-section__info">
      <h2 class="contact-section__title">Contáctanos</h2>

      <p class="contact-section__text">
        Completa el formulario y nuestro equipo se pondrá en contacto contigo lo antes posible.
      </p>
    </div>

    <form class="contact-section__form">

      <div class="contact-section__group">

        <!-- Nombre -->
        <div class="contact-section__field">
          <input type="text" placeholder="Nombre" required>
        </div>

        <!-- Apellido -->
        <div class="contact-section__field">
          <input type="text" placeholder="Apellido" required>
        </div>

        <!-- Teléfono -->
        <div class="contact-section__field">
          <input type="tel" placeholder="Teléfono" required>
        </div>

        <!-- Correo -->
        <div class="contact-section__field">
          <input type="email" placeholder="Correo electrónico" required>
        </div>

        <!-- Tipo de cliente -->
        <div class="contact-section__field">
          <select required>
            <option value="" disabled selected>
              Tipo de cliente
            </option>

            <option value="Persona">
              Persona
            </option>

            <option value="Empresa">
              Empresa
            </option>
          </select>
        </div>

        <!-- Departamento -->
        <div class="contact-section__field">
          <select required>

            <option value="" disabled selected>
              Departamento
            </option>

            <option>Managua</option>
            <option>León</option>
            <option>Granada</option>
            <option>Masaya</option>
            <option>Carazo</option>
            <option>Chinandega</option>
            <option>Estelí</option>
            <option>Matagalpa</option>
            <option>Jinotega</option>
            <option>Boaco</option>

          </select>
        </div>

        <!-- Servicio -->
        <div class="contact-section__field">
          <select required>

            <option value="" disabled selected>
              Servicio de interés
            </option>

            <option>Soporte técnico a domicilio</option>
            <option>Mantenimiento preventivo</option>
            <option>Soporte técnico en línea</option>
            <option>Instalación de redes</option>
            <option>Reparación de equipos</option>

          </select>
        </div>

        <!-- Comentario -->
        <div class="contact-section__field">
          <textarea rows="5" placeholder="Cuéntanos qué necesitas o el problema que presentas"></textarea>
        </div>

        <!-- Botón -->
        <button class="contact-section__btn">
          Enviar mensaje
        </button>

      </div>

    </form>

  </div>
</section>

</body>
</html>
